<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altcoin Signal Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16.8px}
body{background:#fff;color:#111;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;line-height:1.5}

.header{padding:20px 28px 14px;border-bottom:1px solid #e0e0e0}
.logo{font-size:1rem;font-weight:700;letter-spacing:-0.01em}
.subtitle{font-size:0.75rem;color:#888;margin-top:2px}

.config-bar{display:flex;gap:6px;padding:10px 28px;border-bottom:1px solid #e0e0e0;background:#fafafa}
.config-btn{
  font-size:0.7rem;padding:4px 12px;border:1px solid #ddd;border-radius:3px;
  background:#fff;color:#555;cursor:pointer;font-family:inherit;
}
.config-btn:hover{border-color:#111;color:#111}
.config-btn.active{background:#111;color:#fff;border-color:#111}

.dashboard{padding:20px 28px 40px;max-width:1200px}

.section-title{
  font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;
  color:#999;margin:24px 0 8px;padding-bottom:6px;border-bottom:1px solid #eee;
}
.section-title:first-child{margin-top:0}

.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:#e0e0e0;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;margin-bottom:4px}
.metric{background:#fff;padding:12px 14px}
.metric-label{font-size:0.65rem;color:#999;text-transform:uppercase;letter-spacing:0.05em}
.metric-value{font-size:1.3rem;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
.metric-sub{font-size:0.65rem;color:#bbb;margin-top:1px}
.positive{color:#16a34a}
.negative{color:#dc2626}
.neutral{color:#a16207}

table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{
  font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;
  color:#999;padding:6px 8px;text-align:right;border-bottom:2px solid #e0e0e0;
}
th:first-child{text-align:left}
td{font-size:0.8rem;padding:6px 8px;text-align:right;border-bottom:1px solid #f0f0f0}
td:first-child{text-align:left}
tr:hover{background:#fafafa}

.period-table td:first-child{font-weight:600;color:#111}
.coin-table th:nth-child(2){text-align:left}
.coin-table td:nth-child(2){text-align:left;font-weight:600}

.bar-wrap{display:flex;align-items:center;gap:4px;justify-content:flex-end}
.bar{height:10px;border-radius:1px;min-width:1px}
.bar.pos{background:#16a34a}
.bar.neg{background:#dc2626}

.tabs{display:flex;gap:2px;margin-bottom:6px}
.tab{
  font-size:0.7rem;padding:4px 10px;border:none;background:transparent;
  color:#999;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;
}
.tab:hover{color:#111}
.tab.active{color:#111;border-bottom-color:#111;font-weight:600}

.verdict{border:1px solid #e0e0e0;border-radius:4px;padding:16px 18px;margin-top:16px}
.verdict h3{font-size:0.75rem;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
.verdict p{font-size:0.82rem;color:#555;line-height:1.65;margin-bottom:4px}
.verdict strong{color:#111}

.loading{display:flex;align-items:center;justify-content:center;height:50vh;color:#999;font-size:0.85rem}

.footer{padding:16px 28px;border-top:1px solid #eee;font-size:0.65rem;color:#bbb;display:flex;justify-content:space-between}

@media(max-width:768px){
  .header,.config-bar,.dashboard,.footer{padding-left:14px;padding-right:14px}
  .metrics{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Altcoin Signal Dashboard</div>
  <div class="subtitle">RS + Volume Structure + Funding Rate · Binance USDT Perps · OI ≥ $5M</div>
</div>

<div class="config-bar" id="config-bar"></div>

<div class="dashboard" id="dashboard">
  <div class="loading">Loading...</div>
</div>

<div class="footer">
  <span>Data source: Binance USDT Perpetual Futures</span>
  <span id="footer-time"></span>
</div>

<script>
let DATA=null,UNIVERSE=null,activeConfig='v2_tight_stop',activePeriod='full_2025',coinView='top';

const PERIOD_LABELS={
  full_2025:'2025 Full Year',bull_q4_2024:'2025 H1 (Jan\u2013Jun)',
  bear_h2_2025:'2025 H2 (Jul\u2013Dec)',recent_2026:'2026 Q1 (Jan\u2013Mar)'
};
const CONFIG_LABELS={v2_tight_stop:'Tight Stop',v5_balanced:'Balanced',v6_strict:'Strict'};

function pct(v,d=1){if(v==null)return'\u2014';const s=(v*100).toFixed(d);return(s>0?'+':'')+s+'%'}
function pctC(v){return v>0.001?'positive':v<-0.001?'negative':'neutral'}

function renderConfigBar(){
  document.getElementById('config-bar').innerHTML=Object.entries(CONFIG_LABELS).map(([k,l])=>
    '<button class="config-btn '+(k===activeConfig?'active':'')+'" onclick="activeConfig=\''+k+'\';renderConfigBar();renderDashboard()">'+l+'</button>'
  ).join('');
}

function renderDashboard(){
  if(!DATA)return;
  var cfg=DATA[activeConfig],c=cfg[activePeriod]?cfg[activePeriod].summary:cfg.full_2025.summary;
  var alpha=c.signal_median-c.bnh_median;
  var h='';
  h+='<div class="section-title">Overview \u00b7 '+CONFIG_LABELS[activeConfig]+'</div>';
  h+='<div class="metrics">';
  h+='<div class="metric"><div class="metric-label">Coins</div><div class="metric-value">'+c.num_coins+'</div><div class="metric-sub">traded</div></div>';
  h+='<div class="metric"><div class="metric-label">Trades</div><div class="metric-value">'+c.total_trades.toLocaleString()+'</div><div class="metric-sub">total</div></div>';
  h+='<div class="metric"><div class="metric-label">Win Rate</div><div class="metric-value '+(c.win_rate>=0.4?'positive':'neutral')+'">'+(c.win_rate*100).toFixed(1)+'%</div><div class="metric-sub">per trade</div></div>';
  h+='<div class="metric"><div class="metric-label">Alpha vs B&H</div><div class="metric-value '+pctC(alpha)+'">'+pct(alpha)+'</div><div class="metric-sub">median</div></div>';
  h+='<div class="metric"><div class="metric-label">Beat B&H</div><div class="metric-value '+(c.beat_bnh_pct>=0.6?'positive':'negative')+'">'+(c.beat_bnh_pct*100).toFixed(0)+'%</div><div class="metric-sub">of coins</div></div>';
  h+='</div>';

  h+='<div class="section-title">Period Comparison</div>';
  h+='<table class="period-table"><thead><tr><th style="text-align:left">Period</th><th>BTC</th><th>Signal Med.</th><th>B&H Med.</th><th>Alpha</th><th>Win Rate</th><th>Beat B&H</th><th>Trades</th></tr></thead><tbody>';

  var pkeys=Object.keys(PERIOD_LABELS);
  for(var pi=0;pi<pkeys.length;pi++){
    var pk=pkeys[pi],pl=PERIOD_LABELS[pk];
    var s=cfg[pk]?cfg[pk].summary:null;if(!s)continue;
    var a=s.signal_median-s.bnh_median;
    h+='<tr style="cursor:pointer" onclick="activePeriod=\''+pk+'\';renderDashboard()">';
    h+='<td>'+pl+'</td><td class="'+pctC(s.btc_ret)+'">'+pct(s.btc_ret)+'</td>';
    h+='<td class="'+pctC(s.signal_median)+'">'+pct(s.signal_median)+'</td>';
    h+='<td class="'+pctC(s.bnh_median)+'">'+pct(s.bnh_median)+'</td>';
    h+='<td class="'+pctC(a)+'"><strong>'+pct(a)+'</strong></td>';
    h+='<td>'+(s.win_rate*100).toFixed(1)+'%</td>';
    h+='<td class="'+(s.beat_bnh_pct>=0.6?'positive':'negative')+'">'+(s.beat_bnh_pct*100).toFixed(0)+'%</td>';
    h+='<td>'+s.total_trades+'</td></tr>';
  }
  h+='</tbody></table>';

  var pd=cfg[activePeriod];
  if(pd){
    h+='<div class="section-title">Rankings \u00b7 '+PERIOD_LABELS[activePeriod]+'</div>';
    h+='<div class="tabs">';
    h+='<button class="tab '+(coinView==='top'?'active':'')+'" onclick="coinView=\'top\';renderDashboard()">Top 10</button>';
    h+='<button class="tab '+(coinView==='bottom'?'active':'')+'" onclick="coinView=\'bottom\';renderDashboard()">Bottom 10</button>';
    h+='</div>';
    var coins=coinView==='top'?pd.top10:pd.bottom10;
    var mx=0;for(var ci=0;ci<coins.length;ci++){var av=Math.abs(coins[ci][1].total_ret);if(av>mx)mx=av}
    h+='<table class="coin-table"><thead><tr><th style="text-align:left">#</th><th>Symbol</th><th>Signal</th><th></th><th>B&H</th><th>BTC</th><th>Trades</th><th>WR</th></tr></thead><tbody>';
    for(var ci=0;ci<coins.length;ci++){
      var sym=coins[ci][0],v=coins[ci][1];
      var bw=Math.min(Math.abs(v.total_ret)/(mx||1)*100,100);
      h+='<tr><td>'+(ci+1)+'</td><td>'+sym.replace('USDT','')+'</td>';
      h+='<td class="'+pctC(v.total_ret)+'"><strong>'+pct(v.total_ret)+'</strong></td>';
      h+='<td><div class="bar-wrap"><div class="bar '+(v.total_ret>=0?'pos':'neg')+'" style="width:'+bw+'px"></div></div></td>';
      h+='<td class="'+pctC(v.bnh)+'">'+pct(v.bnh)+'</td>';
      h+='<td class="'+pctC(v.btc_ret)+'">'+pct(v.btc_ret)+'</td>';
      h+='<td>'+v.n+'</td><td>'+(v.win_rate*100).toFixed(0)+'%</td></tr>';
    }
    h+='</tbody></table>';
  }

  var fs=cfg.full_2025?cfg.full_2025.summary:null;
  var bs=cfg.bear_h2_2025?cfg.bear_h2_2025.summary:null;
  var rs=cfg.recent_2026?cfg.recent_2026.summary:null;
  if(fs&&bs&&rs){
    var bearAlpha=((bs.signal_median-bs.bnh_median)*100).toFixed(0);
    h+='<div class="verdict">';
    h+='<h3>Assessment</h3>';
    h+='<p><strong>\uBC29\uC5B4\uB825 \uD655\uC778.</strong> 2025 H2 \uD558\uB77D\uC7A5(BTC '+pct(bs.btc_ret)+')\uC5D0\uC11C B&H \uB300\uBE44 <strong>'+bearAlpha+'%p</strong> \uC190\uC2E4 \uBC29\uC5B4. '+(bs.beat_bnh_pct*100).toFixed(0)+'% \uCF54\uC778\uC5D0\uC11C \uC544\uC6C3\uD37C\uD3FC.</p>';
    h+='<p><strong>\uACF5\uACA9\uB825 \uBD80\uC871.</strong> 2026 Q1(BTC '+pct(rs.btc_ret)+')\uC5D0\uC11C B&H \uB300\uBE44 \uC544\uC6C3\uD37C\uD3FC '+(rs.beat_bnh_pct*100).toFixed(0)+'%\uB85C \uD558\uB77D. \uC0C1\uC2B9\uC7A5\uC5D0\uC11C \uC9C4\uC785\uC774 \uB290\uB9BC.</p>';
    h+='<p>\uD604\uC7AC \uC2DC\uADF8\uB110\uC740 <strong>\uC190\uC2E4 \uD68C\uD53C \uD544\uD130</strong>\uB85C \uD65C\uC6A9\uD558\uB294 \uAC83\uC774 \uC801\uD569. \uC54C\uD30C \uC0DD\uC131 \uB3C4\uAD6C\uAC00 \uC544\uB2D8.</p>';
    h+='</div>';
  }
  document.getElementById('dashboard').innerHTML=h;
}

async function init(){
  try{
    var r=await fetch('/results.json');var rd=await r.json();
    var u=await fetch('/universe.json');var ud=await u.json();
    DATA=rd;UNIVERSE=ud;
    document.getElementById('footer-time').textContent='Updated '+new Date().toISOString().split('T')[0];
    renderConfigBar();renderDashboard();
  }catch(e){document.getElementById('dashboard').innerHTML='<div class="loading" style="color:#dc2626">Error: '+e.message+'</div>'}
}
init();
</script>
</body>
</html>
