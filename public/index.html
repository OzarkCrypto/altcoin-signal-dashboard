<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altcoin Signal Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16.8px}
body{background:#fff;color:#111;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;line-height:1.6}
a{color:#111}

.header{padding:20px 28px 14px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}
.header-left{}
.logo{font-size:1rem;font-weight:700}
.subtitle{font-size:0.75rem;color:#888;margin-top:2px}
.lang-toggle{
  display:flex;border:1px solid #ddd;border-radius:4px;overflow:hidden;font-size:0.7rem;
}
.lang-btn{
  padding:4px 12px;border:none;background:#fff;color:#888;cursor:pointer;font-family:inherit;
}
.lang-btn.active{background:#111;color:#fff}

.mode-bar{display:flex;gap:0;border-bottom:1px solid #e0e0e0}
.mode-btn{
  flex:1;font-size:0.8rem;padding:10px 20px;border:none;background:#fff;
  color:#888;cursor:pointer;font-family:inherit;font-weight:500;
  border-bottom:2px solid transparent;text-align:center;
}
.mode-btn:hover{color:#111;background:#fafafa}
.mode-btn.active-off{color:#111;border-bottom-color:#dc2626;font-weight:700}
.mode-btn.active-def{color:#111;border-bottom-color:#16a34a;font-weight:700}
.mode-btn.active-how{color:#111;border-bottom-color:#2563eb;font-weight:700}

.config-bar{display:flex;gap:6px;padding:10px 28px;border-bottom:1px solid #eee;background:#fafafa}
.config-btn{
  font-size:0.7rem;padding:4px 12px;border:1px solid #ddd;border-radius:3px;
  background:#fff;color:#555;cursor:pointer;font-family:inherit;
}
.config-btn:hover{border-color:#111;color:#111}
.config-btn.active{background:#111;color:#fff;border-color:#111}

.dashboard{padding:20px 28px 40px;max-width:1200px}
.section-title{
  font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;
  color:#999;margin:24px 0 8px;padding-bottom:6px;border-bottom:1px solid #eee;
}
.section-title:first-child{margin-top:0}
.strat-badge{
  display:inline-block;font-size:0.55rem;padding:2px 6px;border-radius:2px;
  font-weight:700;letter-spacing:0.05em;margin-left:6px;vertical-align:middle;
}
.badge-off{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.badge-def{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}

.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:#e0e0e0;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;margin-bottom:4px}
.metric{background:#fff;padding:12px 14px}
.metric-label{font-size:0.65rem;color:#999;text-transform:uppercase;letter-spacing:0.05em}
.metric-value{font-size:1.3rem;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
.metric-sub{font-size:0.65rem;color:#bbb;margin-top:1px}
.positive{color:#16a34a}.negative{color:#dc2626}.neutral{color:#a16207}

table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#999;padding:6px 8px;text-align:right;border-bottom:2px solid #e0e0e0}
th:first-child{text-align:left}
td{font-size:0.8rem;padding:6px 8px;text-align:right;border-bottom:1px solid #f0f0f0}
td:first-child{text-align:left}
tr:hover{background:#fafafa}
.coin-table th:nth-child(2){text-align:left}
.coin-table td:nth-child(2){text-align:left;font-weight:600}

.bar-wrap{display:flex;align-items:center;gap:4px;justify-content:flex-end}
.bar{height:10px;border-radius:1px;min-width:1px}
.bar.pos{background:#16a34a}.bar.neg{background:#dc2626}

.tabs{display:flex;gap:2px;margin-bottom:6px}
.tab{font-size:0.7rem;padding:4px 10px;border:none;background:transparent;color:#999;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent}
.tab:hover{color:#111}
.tab.active{color:#111;border-bottom-color:#111;font-weight:600}

.compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
.compare-card{border:1px solid #e0e0e0;border-radius:4px;padding:14px 16px}
.compare-card h4{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.compare-card .stat{display:flex;justify-content:space-between;padding:3px 0;font-size:0.8rem}
.compare-card .stat-label{color:#888}
.compare-card .stat-value{font-weight:600;font-variant-numeric:tabular-nums}

.verdict{border:1px solid #e0e0e0;border-radius:4px;padding:16px 18px;margin-top:16px}
.verdict h3{font-size:0.75rem;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
.verdict p{font-size:0.82rem;color:#555;line-height:1.7;margin-bottom:6px}
.verdict strong{color:#111}

/* How it works */
.how-section{margin-bottom:28px}
.how-section h2{font-size:1rem;font-weight:700;margin-bottom:12px;padding-top:4px}
.how-section h3{font-size:0.85rem;font-weight:700;margin:16px 0 6px;color:#333}
.how-section p{font-size:0.82rem;color:#444;line-height:1.75;margin-bottom:8px}
.how-section .step{
  border-left:3px solid #e0e0e0;padding:10px 16px;margin:8px 0;background:#fafafa;border-radius:0 4px 4px 0;
}
.how-section .step.off{border-left-color:#dc2626}
.how-section .step.def{border-left-color:#16a34a}
.how-section .step-num{font-size:0.65rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.how-section .step-title{font-size:0.82rem;font-weight:700;color:#111;margin-bottom:4px}
.how-section .step-desc{font-size:0.78rem;color:#555;line-height:1.65}
.how-section .example{
  background:#f8f8f8;border:1px solid #eee;border-radius:4px;padding:10px 14px;
  font-size:0.78rem;color:#555;margin:8px 0;line-height:1.6;
}
.how-section .example strong{color:#111}

.loading{display:flex;align-items:center;justify-content:center;height:50vh;color:#999;font-size:0.85rem}
.footer{padding:16px 28px;border-top:1px solid #eee;font-size:0.65rem;color:#bbb;display:flex;justify-content:space-between}
@media(max-width:768px){
  .header,.config-bar,.dashboard,.footer{padding-left:14px;padding-right:14px}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .compare{grid-template-columns:1fr}
}
</style>
</head>

var PERIODS={full_2025:'full2025',h1_2025:'h12025',h2_2025:'h22025',q1_2026:'q12026'};
var OFF_LABELS_KEY={off_breakout_20:'offBtnBreakout20',off_breakout_14:'offBtnBreakout14',off_aggressive:'offBtnAggressive',off_wide_trail:'offBtnWideTrail'};
var DEF_LABELS_KEY={def_tight:'defBtnTight',def_balanced:'defBtnBalanced'};

function t(key){return T[lang][key]||key}
function pLabel(pk){return t(PERIODS[pk])}
function pct(v,d){if(d===undefined)d=1;if(v==null)return'\u2014';var s=(v*100).toFixed(d);return(s>0?'+':'')+s+'%'}
function pctC(v){return v>0.001?'positive':v<-0.001?'negative':'neutral'}

function renderLang(){
  document.getElementById('lang-toggle').innerHTML=
    '<button class="lang-btn '+(lang==='en'?'active':'')+'" onclick="lang=\'en\';render()">EN</button>'+
    '<button class="lang-btn '+(lang==='kr'?'active':'')+'" onclick="lang=\'kr\';render()">KR</button>';
  document.getElementById('subtitle').textContent=t('subtitle');
  document.getElementById('footer-src').textContent=t('footerSrc');
}

function renderModeBar(){
  document.getElementById('mode-bar').innerHTML=
    '<button class="mode-btn '+(mode==='compare'?'active-off':'')+'" onclick="mode=\'compare\';render()">'+t('compare')+'</button>'+
    '<button class="mode-btn '+(mode==='offensive'?'active-off':'')+'" onclick="mode=\'offensive\';render()">'+t('offensive')+'</button>'+
    '<button class="mode-btn '+(mode==='defensive'?'active-def':'')+'" onclick="mode=\'defensive\';render()">'+t('defensive')+'</button>'+
    '<button class="mode-btn '+(mode==='how'?'active-how':'')+'" onclick="mode=\'how\';render()">'+t('howItWorks')+'</button>';
}

function renderConfigBar(){
  var el=document.getElementById('config-bar');
  if(mode==='compare'||mode==='how'){el.innerHTML='';return}
  var keys=mode==='offensive'?OFF_LABELS_KEY:DEF_LABELS_KEY;
  var active=mode==='offensive'?activeOff:activeDef;
  var h='';
  for(var k in keys){
    h+='<button class="config-btn '+(k===active?'active':'')+'" onclick="'+(mode==='offensive'?'activeOff':'activeDef')+'=\''+k+'\';render()">'+t(keys[k])+'</button>';
  }
  el.innerHTML=h;
}

function renderCompare(){
  var h='<div class="section-title">'+t('headToHead')+'</div>';
  h+='<table><thead><tr><th style="text-align:left">'+t('period')+'</th><th>'+t('type')+'</th><th>'+t('signalMed')+'</th><th>'+t('bnhMed')+'</th><th>'+t('btcCol')+'</th><th>'+t('alpha')+'</th><th>'+t('beatBnh')+'</th><th>'+t('winRate')+'</th><th>'+t('trades')+'</th></tr></thead><tbody>';
  var pkeys=['h1_2025','h2_2025','q1_2026','full_2025'];
  for(var i=0;i<pkeys.length;i++){
    var pk=pkeys[i];
    var os=DATA.offensive[activeOff][pk]?DATA.offensive[activeOff][pk].summary:null;
    var ds=DATA.defensive[activeDef][pk]?DATA.defensive[activeDef][pk].summary:null;
    if(os){var oa=os.signal_median-os.bnh_median;
      h+='<tr><td style="font-weight:600">'+pLabel(pk)+'</td><td><span class="strat-badge badge-off">'+t('offLabel')+'</span></td>';
      h+='<td class="'+pctC(os.signal_median)+'">'+pct(os.signal_median)+'</td><td class="'+pctC(os.bnh_median)+'">'+pct(os.bnh_median)+'</td><td class="'+pctC(os.btc_ret)+'">'+pct(os.btc_ret)+'</td>';
      h+='<td class="'+pctC(oa)+'"><strong>'+pct(oa)+'</strong></td><td class="'+(os.beat_bnh_pct>=0.6?'positive':'negative')+'">'+(os.beat_bnh_pct*100).toFixed(0)+'%</td>';
      h+='<td>'+(os.win_rate*100).toFixed(1)+'%</td><td>'+os.total_trades+'</td></tr>';}
    if(ds){var da=ds.signal_median-ds.bnh_median;
      h+='<tr><td></td><td><span class="strat-badge badge-def">'+t('defLabel')+'</span></td>';
      h+='<td class="'+pctC(ds.signal_median)+'">'+pct(ds.signal_median)+'</td><td class="'+pctC(ds.bnh_median)+'">'+pct(ds.bnh_median)+'</td><td class="'+pctC(ds.btc_ret)+'">'+pct(ds.btc_ret)+'</td>';
      h+='<td class="'+pctC(da)+'"><strong>'+pct(da)+'</strong></td><td class="'+(ds.beat_bnh_pct>=0.6?'positive':'negative')+'">'+(ds.beat_bnh_pct*100).toFixed(0)+'%</td>';
      h+='<td>'+(ds.win_rate*100).toFixed(1)+'%</td><td>'+ds.total_trades+'</td></tr>';}
  }
  h+='</tbody></table>';
  var os=DATA.offensive[activeOff].full_2025.summary,ds=DATA.defensive[activeDef].full_2025.summary;
  h+='<div class="section-title">'+t('stratProfile')+' \u2014 '+t('full2025')+'</div><div class="compare">';
  h+='<div class="compare-card"><h4><span class="strat-badge badge-off">'+t('offLabel')+'</span></h4>';
  h+='<div class="stat"><span class="stat-label">'+t('trades')+'</span><span class="stat-value">'+os.total_trades+'</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('winRate')+'</span><span class="stat-value">'+(os.win_rate*100).toFixed(1)+'%</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('signalMed')+'</span><span class="stat-value '+pctC(os.signal_median)+'">'+pct(os.signal_median)+'</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('beatBnh')+'</span><span class="stat-value '+(os.beat_bnh_pct>=0.7?'positive':'negative')+'">'+(os.beat_bnh_pct*100).toFixed(0)+'%</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('logic')+'</span><span class="stat-value" style="font-size:0.7rem;color:#888">'+t('offLogic')+'</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('stopTrail')+'</span><span class="stat-value" style="font-size:0.7rem;color:#888">'+t('offStop')+'</span></div></div>';
  h+='<div class="compare-card"><h4><span class="strat-badge badge-def">'+t('defLabel')+'</span></h4>';
  h+='<div class="stat"><span class="stat-label">'+t('trades')+'</span><span class="stat-value">'+ds.total_trades+'</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('winRate')+'</span><span class="stat-value">'+(ds.win_rate*100).toFixed(1)+'%</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('signalMed')+'</span><span class="stat-value '+pctC(ds.signal_median)+'">'+pct(ds.signal_median)+'</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('beatBnh')+'</span><span class="stat-value '+(ds.beat_bnh_pct>=0.7?'positive':'negative')+'">'+(ds.beat_bnh_pct*100).toFixed(0)+'%</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('logic')+'</span><span class="stat-value" style="font-size:0.7rem;color:#888">'+t('defLogic')+'</span></div>';
  h+='<div class="stat"><span class="stat-label">'+t('stopTrail')+'</span><span class="stat-value" style="font-size:0.7rem;color:#888">'+t('defStop')+'</span></div></div></div>';
  var obs=DATA.offensive[activeOff].h2_2025.summary,dbs=DATA.defensive[activeDef].h2_2025.summary;
  h+='<div class="verdict"><h3>'+t('assessment')+'</h3>';
  h+=t('verdictOff')(os.total_trades,ds.total_trades,(os.beat_bnh_pct*100).toFixed(0),(ds.beat_bnh_pct*100).toFixed(0));
  h+=t('verdictDef')((obs.beat_bnh_pct*100).toFixed(0),(dbs.beat_bnh_pct*100).toFixed(0));
  h+=t('verdictBoth')+'</div>';
  return h;
}

function renderSingle(st){
  var cfgs=st==='offensive'?DATA.offensive:DATA.defensive;
  var active=st==='offensive'?activeOff:activeDef;
  var lkeys=st==='offensive'?OFF_LABELS_KEY:DEF_LABELS_KEY;
  var badge=st==='offensive'?'<span class="strat-badge badge-off">'+t('offLabel')+'</span>':'<span class="strat-badge badge-def">'+t('defLabel')+'</span>';
  var cfg=cfgs[active];var c=cfg[activePeriod]?cfg[activePeriod].summary:cfg.full_2025.summary;
  var alpha=c.signal_median-c.bnh_median;
  var h='<div class="section-title">'+badge+' '+t(lkeys[active])+' \u00b7 '+t('overview')+'</div>';
  h+='<div class="metrics">';
  h+='<div class="metric"><div class="metric-label">'+t('coins')+'</div><div class="metric-value">'+c.num_coins+'</div><div class="metric-sub">'+t('coinsDesc')+'</div></div>';
  h+='<div class="metric"><div class="metric-label">'+t('trades')+'</div><div class="metric-value">'+c.total_trades+'</div><div class="metric-sub">'+t('total')+'</div></div>';
  h+='<div class="metric"><div class="metric-label">'+t('winRate')+'</div><div class="metric-value '+(c.win_rate>=0.4?'positive':'neutral')+'">'+(c.win_rate*100).toFixed(1)+'%</div><div class="metric-sub">'+t('perTrade')+'</div></div>';
  h+='<div class="metric"><div class="metric-label">'+t('alphaVsBnh')+'</div><div class="metric-value '+pctC(alpha)+'">'+pct(alpha)+'</div><div class="metric-sub">'+t('median')+'</div></div>';
  h+='<div class="metric"><div class="metric-label">'+t('beatBnh')+'</div><div class="metric-value '+(c.beat_bnh_pct>=0.6?'positive':'negative')+'">'+(c.beat_bnh_pct*100).toFixed(0)+'%</div><div class="metric-sub">'+t('ofCoins')+'</div></div></div>';
  h+='<div class="section-title">'+t('periodComparison')+'</div>';
  h+='<table><thead><tr><th style="text-align:left">'+t('period')+'</th><th>'+t('btcCol')+'</th><th>'+t('signalMed')+'</th><th>'+t('bnhMed')+'</th><th>'+t('alpha')+'</th><th>'+t('winRate')+'</th><th>'+t('beatBnh')+'</th><th>'+t('trades')+'</th></tr></thead><tbody>';
  var pkeys=['h1_2025','h2_2025','q1_2026','full_2025'];
  for(var i=0;i<pkeys.length;i++){var pk=pkeys[i],s=cfg[pk]?cfg[pk].summary:null;if(!s)continue;var a=s.signal_median-s.bnh_median;
    h+='<tr style="cursor:pointer" onclick="activePeriod=\''+pk+'\';render()"><td style="font-weight:600">'+pLabel(pk)+'</td><td class="'+pctC(s.btc_ret)+'">'+pct(s.btc_ret)+'</td><td class="'+pctC(s.signal_median)+'">'+pct(s.signal_median)+'</td><td class="'+pctC(s.bnh_median)+'">'+pct(s.bnh_median)+'</td><td class="'+pctC(a)+'"><strong>'+pct(a)+'</strong></td><td>'+(s.win_rate*100).toFixed(1)+'%</td><td class="'+(s.beat_bnh_pct>=0.6?'positive':'negative')+'">'+(s.beat_bnh_pct*100).toFixed(0)+'%</td><td>'+s.total_trades+'</td></tr>';}
  h+='</tbody></table>';
  var pd=cfg[activePeriod];
  if(pd){h+='<div class="section-title">'+t('rankings')+' \u00b7 '+pLabel(activePeriod)+'</div>';
    h+='<div class="tabs"><button class="tab '+(coinView==='top'?'active':'')+'" onclick="coinView=\'top\';render()">'+t('top10')+'</button><button class="tab '+(coinView==='bottom'?'active':'')+'" onclick="coinView=\'bottom\';render()">'+t('bottom10')+'</button></div>';
    var coins=coinView==='top'?pd.top10:pd.bottom10;var mx=0;for(var j=0;j<coins.length;j++){var av=Math.abs(coins[j][1].total_ret);if(av>mx)mx=av}
    h+='<table class="coin-table"><thead><tr><th style="text-align:left">#</th><th>'+t('symbol')+'</th><th>'+t('signal')+'</th><th></th><th>'+t('bnh')+'</th><th>'+t('btc')+'</th><th>'+t('trades')+'</th><th>'+t('wr')+'</th></tr></thead><tbody>';
    for(var j=0;j<coins.length;j++){var sym=coins[j][0],v=coins[j][1];var bw=Math.min(Math.abs(v.total_ret)/(mx||1)*100,100);
      h+='<tr><td>'+(j+1)+'</td><td>'+sym.replace('USDT','')+'</td><td class="'+pctC(v.total_ret)+'"><strong>'+pct(v.total_ret)+'</strong></td><td><div class="bar-wrap"><div class="bar '+(v.total_ret>=0?'pos':'neg')+'" style="width:'+bw+'px"></div></div></td><td class="'+pctC(v.bnh)+'">'+pct(v.bnh)+'</td><td class="'+pctC(v.btc_ret)+'">'+pct(v.btc_ret)+'</td><td>'+v.n+'</td><td>'+(v.win_rate*100).toFixed(0)+'%</td></tr>';}
    h+='</tbody></table>';}
  return h;
}

function render(){
  renderLang();renderModeBar();renderConfigBar();
  if(mode==='how'){document.getElementById('dashboard').innerHTML=renderHow();return}
  if(!DATA){document.getElementById('dashboard').innerHTML='<div class="loading">Loading...</div>';return}
  if(mode==='compare') document.getElementById('dashboard').innerHTML=renderCompare();
  else document.getElementById('dashboard').innerHTML=renderSingle(mode);
}

async function init(){
  try{
    var r=await fetch('/dual_results.json');DATA=await r.json();
    document.getElementById('footer-time').textContent='Updated '+new Date().toISOString().split('T')[0];
    render();
  }catch(e){document.getElementById('dashboard').innerHTML='<div class="loading" style="color:#dc2626">Error: '+e.message+'</div>'}
}
init();
</script>
