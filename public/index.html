<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altcoin Signal Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#222233;
  --border:#2a2a3a;--text:#e0e0e8;--dim:#6a6a80;--accent:#00d4aa;
  --red:#ff4466;--green:#00d4aa;--yellow:#ffaa22;--blue:#4488ff;
  --font-mono:'JetBrains Mono',monospace;--font-sans:'Outfit',sans-serif;
}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;overflow-x:hidden}

/* Header */
.header{
  padding:2rem 2.5rem 1.5rem;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,#0f0f18 0%,var(--bg) 100%);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem}
.logo{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;letter-spacing:0.05em;color:var(--accent)}
.logo span{color:var(--dim);font-weight:400}
.header-meta{font-size:0.75rem;color:var(--dim);font-family:var(--font-mono)}
.subtitle{font-size:0.85rem;color:var(--dim);margin-top:0.25rem}

/* Config selector */
.config-bar{
  display:flex;gap:0.5rem;padding:1rem 2.5rem;border-bottom:1px solid var(--border);
  background:var(--surface);overflow-x:auto;
}
.config-btn{
  font-family:var(--font-mono);font-size:0.75rem;padding:0.4rem 1rem;
  border:1px solid var(--border);border-radius:4px;background:transparent;
  color:var(--dim);cursor:pointer;white-space:nowrap;transition:all 0.2s;
}
.config-btn:hover{border-color:var(--accent);color:var(--text)}
.config-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}

/* Grid */
.dashboard{padding:1.5rem 2.5rem 3rem;max-width:1400px;margin:0 auto}
.section-title{
  font-family:var(--font-mono);font-size:0.7rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.15em;color:var(--dim);
  margin:2rem 0 0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);
}
.section-title:first-child{margin-top:0}

/* Metric cards */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0.75rem;margin-bottom:0.5rem}
.metric{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:1rem 1.25rem;position:relative;overflow:hidden;
}
.metric::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent);opacity:0.5;
}
.metric.red::before{background:var(--red)}
.metric.yellow::before{background:var(--yellow)}
.metric.blue::before{background:var(--blue)}
.metric-label{font-size:0.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.4rem}
.metric-value{font-family:var(--font-mono);font-size:1.5rem;font-weight:700}
.metric-sub{font-family:var(--font-mono);font-size:0.7rem;color:var(--dim);margin-top:0.3rem}
.positive{color:var(--green)}
.negative{color:var(--red)}
.neutral{color:var(--yellow)}

/* Period comparison table */
.period-table{width:100%;border-collapse:collapse;margin-top:0.5rem}
.period-table th{
  font-family:var(--font-mono);font-size:0.65rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);
  padding:0.6rem 0.8rem;text-align:right;border-bottom:1px solid var(--border);
}
.period-table th:first-child{text-align:left}
.period-table td{
  font-family:var(--font-mono);font-size:0.8rem;padding:0.7rem 0.8rem;
  text-align:right;border-bottom:1px solid rgba(42,42,58,0.5);
}
.period-table td:first-child{text-align:left;font-weight:500;color:var(--text)}
.period-table tr:hover{background:var(--surface2)}
.period-table .period-name{font-weight:600;color:var(--accent);font-size:0.75rem}

/* Coin table */
.coin-table-wrap{overflow-x:auto;margin-top:0.5rem}
.coin-table{width:100%;border-collapse:collapse;min-width:700px}
.coin-table th{
  font-family:var(--font-mono);font-size:0.6rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);
  padding:0.5rem 0.6rem;text-align:right;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);
}
.coin-table th:first-child,
.coin-table th:nth-child(2){text-align:left}
.coin-table td{
  font-family:var(--font-mono);font-size:0.75rem;padding:0.5rem 0.6rem;
  text-align:right;border-bottom:1px solid rgba(42,42,58,0.3);
}
.coin-table td:first-child{text-align:left;color:var(--dim);font-size:0.65rem}
.coin-table td:nth-child(2){text-align:left;font-weight:600}
.coin-table tr:hover{background:var(--surface)}

.rank{
  display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;
  border-radius:3px;font-size:0.6rem;font-weight:700;
}
.rank-top{background:rgba(0,212,170,0.15);color:var(--green)}
.rank-bottom{background:rgba(255,68,102,0.15);color:var(--red)}

/* Bar visualization */
.bar-wrap{display:flex;align-items:center;gap:0.5rem;justify-content:flex-end}
.bar{height:14px;border-radius:2px;min-width:2px;transition:width 0.5s ease}
.bar.pos{background:var(--green)}
.bar.neg{background:var(--red)}

/* Tabs */
.tabs{display:flex;gap:0.25rem;margin-bottom:0.5rem}
.tab{
  font-family:var(--font-mono);font-size:0.7rem;padding:0.35rem 0.8rem;
  border:none;border-radius:3px;background:transparent;
  color:var(--dim);cursor:pointer;transition:all 0.15s;
}
.tab:hover{color:var(--text)}
.tab.active{background:var(--surface2);color:var(--accent);font-weight:600}

/* Verdict section */
.verdict{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:1.5rem;margin-top:1rem;
}
.verdict h3{font-family:var(--font-mono);font-size:0.8rem;color:var(--accent);margin-bottom:0.75rem}
.verdict p{font-size:0.85rem;color:var(--dim);line-height:1.7;margin-bottom:0.5rem}
.verdict strong{color:var(--text)}

/* Loading */
.loading{
  display:flex;align-items:center;justify-content:center;height:60vh;
  font-family:var(--font-mono);color:var(--dim);font-size:0.85rem;
}
.loading::before{
  content:'';width:16px;height:16px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;margin-right:0.75rem;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{
  padding:1.5rem 2.5rem;border-top:1px solid var(--border);margin-top:2rem;
  font-family:var(--font-mono);font-size:0.65rem;color:var(--dim);
  display:flex;justify-content:space-between;
}

/* Responsive */
@media(max-width:768px){
  .header,.config-bar,.dashboard,.footer{padding-left:1rem;padding-right:1rem}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .metric-value{font-size:1.2rem}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">SIGNAL <span>// ALTCOIN SCREENER</span></div>
      <div class="subtitle">RS + Volume Structure + Funding Rate — Binance USDT Perpetuals</div>
    </div>
    <div class="header-meta" id="header-meta">Loading...</div>
  </div>
</div>

<div class="config-bar" id="config-bar"></div>

<div class="dashboard" id="dashboard">
  <div class="loading">Fetching results...</div>
</div>

<div class="footer">
  <span>Data: Binance USDT Perpetual Futures (OI ≥ $5M) · Signal: RS + Vol + Funding</span>
  <span id="footer-time"></span>
</div>

<script>
let DATA = null;
let UNIVERSE = null;
let activeConfig = 'v2_tight_stop';
let activePeriod = 'full_2025';
let coinView = 'top';

const PERIOD_LABELS = {
  'full_2025': '2025 Full Year',
  'bull_q4_2024': '2025 H1 (Jan-Jun)',
  'bear_h2_2025': '2025 H2 (Jul-Dec)',
  'recent_2026': '2026 Q1 (Jan-Mar)'
};

const CONFIG_LABELS = {
  'v2_tight_stop': 'Tight Stop (v2)',
  'v5_balanced': 'Balanced (v5)',
  'v6_strict': 'Strict (v6)'
};

function pct(v, decimals=1) {
  if (v === null || v === undefined) return '—';
  const val = (v * 100).toFixed(decimals);
  return val > 0 ? `+${val}%` : `${val}%`;
}

function pctClass(v) {
  if (v > 0.001) return 'positive';
  if (v < -0.001) return 'negative';
  return 'neutral';
}

function usd(v) {
  if (v >= 1e9) return `$${(v/1e9).toFixed(1)}B`;
  if (v >= 1e6) return `$${(v/1e6).toFixed(0)}M`;
  if (v >= 1e3) return `$${(v/1e3).toFixed(0)}K`;
  return `$${v.toFixed(0)}`;
}

function renderConfigBar() {
  const bar = document.getElementById('config-bar');
  bar.innerHTML = Object.entries(CONFIG_LABELS).map(([key, label]) =>
    `<button class="config-btn ${key === activeConfig ? 'active' : ''}" onclick="setConfig('${key}')">${label}</button>`
  ).join('');
}

function setConfig(key) {
  activeConfig = key;
  renderConfigBar();
  renderDashboard();
}

function renderDashboard() {
  if (!DATA) return;
  const cfg = DATA[activeConfig];
  const el = document.getElementById('dashboard');

  // Current period summary
  const current = cfg[activePeriod]?.summary || cfg['full_2025'].summary;

  // Summary metrics
  let html = `
    <div class="section-title">Overview — ${CONFIG_LABELS[activeConfig]}</div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Universe</div>
        <div class="metric-value">${current.num_coins}</div>
        <div class="metric-sub">coins traded</div>
      </div>
      <div class="metric blue">
        <div class="metric-label">Total Trades</div>
        <div class="metric-value">${current.total_trades.toLocaleString()}</div>
        <div class="metric-sub">across all periods</div>
      </div>
      <div class="metric ${current.win_rate >= 0.4 ? '' : 'yellow'}">
        <div class="metric-label">Win Rate</div>
        <div class="metric-value ${current.win_rate >= 0.4 ? 'positive' : 'neutral'}">${(current.win_rate*100).toFixed(1)}%</div>
        <div class="metric-sub">per-trade basis</div>
      </div>
      <div class="metric">
        <div class="metric-label">Signal vs B&H</div>
        <div class="metric-value ${pctClass(current.signal_median - current.bnh_median)}">${pct(current.signal_median - current.bnh_median)}</div>
        <div class="metric-sub">median alpha</div>
      </div>
      <div class="metric ${current.beat_bnh_pct >= 0.6 ? '' : 'red'}">
        <div class="metric-label">Beat B&H</div>
        <div class="metric-value ${current.beat_bnh_pct >= 0.6 ? 'positive' : 'negative'}">${(current.beat_bnh_pct*100).toFixed(0)}%</div>
        <div class="metric-sub">of coins outperformed</div>
      </div>
    </div>
  `;

  // Period comparison table
  html += `<div class="section-title">Period Comparison</div>`;
  html += `<table class="period-table"><thead><tr>
    <th>Period</th><th>BTC</th><th>Signal Med.</th><th>B&H Med.</th>
    <th>Alpha</th><th>Win Rate</th><th>Beat B&H</th><th>Trades</th>
  </tr></thead><tbody>`;

  for (const [pKey, pLabel] of Object.entries(PERIOD_LABELS)) {
    const s = cfg[pKey]?.summary;
    if (!s) continue;
    const alpha = s.signal_median - s.bnh_median;
    html += `<tr onclick="activePeriod='${pKey}';renderDashboard()" style="cursor:pointer">
      <td class="period-name">${pLabel}</td>
      <td class="${pctClass(s.btc_ret)}">${pct(s.btc_ret)}</td>
      <td class="${pctClass(s.signal_median)}">${pct(s.signal_median)}</td>
      <td class="${pctClass(s.bnh_median)}">${pct(s.bnh_median)}</td>
      <td class="${pctClass(alpha)}"><strong>${pct(alpha)}</strong></td>
      <td>${(s.win_rate*100).toFixed(1)}%</td>
      <td class="${s.beat_bnh_pct >= 0.6 ? 'positive' : 'negative'}">${(s.beat_bnh_pct*100).toFixed(0)}%</td>
      <td>${s.total_trades}</td>
    </tr>`;
  }
  html += `</tbody></table>`;

  // Coin rankings
  const periodData = cfg[activePeriod];
  if (periodData) {
    html += `
      <div class="section-title">Coin Rankings — ${PERIOD_LABELS[activePeriod]}</div>
      <div class="tabs">
        <button class="tab ${coinView==='top'?'active':''}" onclick="coinView='top';renderDashboard()">Top Performers</button>
        <button class="tab ${coinView==='bottom'?'active':''}" onclick="coinView='bottom';renderDashboard()">Worst Performers</button>
      </div>
    `;

    const coins = coinView === 'top' ? periodData.top10 : periodData.bottom10;
    const maxAbs = Math.max(...coins.map(([,v]) => Math.abs(v.total_ret)));

    html += `<div class="coin-table-wrap"><table class="coin-table"><thead><tr>
      <th>#</th><th>Symbol</th><th>Signal Return</th><th></th>
      <th>B&H Return</th><th>BTC Return</th><th>Trades</th><th>Win Rate</th>
    </tr></thead><tbody>`;

    coins.forEach(([sym, v], i) => {
      const rank = coinView === 'top' ? i+1 : coins.length - i;
      const rankClass = coinView === 'top' ? 'rank-top' : 'rank-bottom';
      const barW = Math.min(Math.abs(v.total_ret) / (maxAbs || 1) * 120, 120);
      const barClass = v.total_ret >= 0 ? 'pos' : 'neg';
      const cleanSym = sym.replace('USDT','');

      html += `<tr>
        <td><span class="rank ${rankClass}">${coinView==='top' ? i+1 : '—'}</span></td>
        <td>${cleanSym}</td>
        <td class="${pctClass(v.total_ret)}"><strong>${pct(v.total_ret)}</strong></td>
        <td><div class="bar-wrap"><div class="bar ${barClass}" style="width:${barW}px"></div></div></td>
        <td class="${pctClass(v.bnh)}">${pct(v.bnh)}</td>
        <td class="${pctClass(v.btc_ret)}">${pct(v.btc_ret)}</td>
        <td>${v.n}</td>
        <td>${(v.win_rate*100).toFixed(0)}%</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // Verdict
  const fullS = cfg['full_2025']?.summary;
  const bearS = cfg['bear_h2_2025']?.summary;
  const recentS = cfg['recent_2026']?.summary;

  if (fullS && bearS && recentS) {
    const bearAlpha = ((bearS.signal_median - bearS.bnh_median)*100).toFixed(0);
    html += `
      <div class="verdict">
        <h3>// SIGNAL ASSESSMENT</h3>
        <p><strong>Defensive value confirmed.</strong> In the 2025 H2 bear market (BTC ${pct(bearS.btc_ret)}), the signal defended <strong>${bearAlpha}%p</strong> of median drawdown vs buy & hold, outperforming in <strong>${(bearS.beat_bnh_pct*100).toFixed(0)}%</strong> of coins.</p>
        <p><strong>Offensive weakness identified.</strong> In 2026 Q1 (BTC ${pct(recentS.btc_ret)}), the signal underperformed B&H — beating it in only <strong>${(recentS.beat_bnh_pct*100).toFixed(0)}%</strong> of coins. The signal exits too early in rallies.</p>
        <p>This is a <strong>loss-avoidance tool</strong>, not an alpha generator. Best used as a portfolio filter: reduce exposure when signals are off, increase when 2+ signals align.</p>
      </div>
    `;
  }

  el.innerHTML = html;
}

// Boot
async function init() {
  try {
    const [resR, uniR] = await Promise.all([
      fetch('/results.json').then(r => r.json()),
      fetch('/universe.json').then(r => r.json())
    ]);
    DATA = resR;
    UNIVERSE = uniR;

    document.getElementById('header-meta').textContent =
      `${UNIVERSE.length} coins · ${Object.keys(PERIOD_LABELS).length} periods · ${Object.keys(CONFIG_LABELS).length} configs`;
    document.getElementById('footer-time').textContent =
      `Last updated: ${new Date().toISOString().split('T')[0]}`;

    renderConfigBar();
    renderDashboard();
  } catch(e) {
    document.getElementById('dashboard').innerHTML =
      `<div class="loading" style="color:var(--red)">Error loading data: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
